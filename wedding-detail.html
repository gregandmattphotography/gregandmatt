<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wedding — GREG & MATT</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+KR:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#fff;--text:#1c1c1c;--muted:#999;--accent:#b09070;
  --light:#f8f8f6;--serif:'Cormorant Garamond',serif;
  --sans:'DM Sans','Noto Sans KR',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--text);font-family:var(--sans)}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;flex-direction:column;align-items:center;padding:26px 0 0;transition:background 0.4s,padding 0.4s}
nav.dark,nav.scrolled{background:rgba(255,255,255,0.96);backdrop-filter:blur(8px);border-bottom:1px solid #eee;padding:16px 0}
.nav-logo{text-decoration:none;margin-bottom:10px;display:block}
.nav-logo img{height:26px;width:auto}
.logo-w{display:block}.logo-d{display:none}
nav.dark .logo-w,nav.scrolled .logo-w{display:none}
nav.dark .logo-d,nav.scrolled .logo-d{display:block}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:0.63rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.85);text-decoration:none;transition:color 0.2s;font-weight:300}
nav.dark .nav-links a,nav.scrolled .nav-links a{color:var(--muted)}
.nav-links a:hover,.nav-links a.active{color:#fff!important}
nav.dark .nav-links a:hover,nav.dark .nav-links a.active,nav.scrolled .nav-links a:hover,nav.scrolled .nav-links a.active{color:var(--text)!important}
footer{padding:44px 48px 36px;border-top:1px solid #eee;display:flex;flex-direction:column;align-items:center;gap:16px}
.footer-logo img{height:28px;width:auto}
.footer-sns{display:flex;gap:24px}
.footer-sns a{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s}
.footer-sns a:hover{color:var(--text)}
.footer-copy{font-size:0.62rem;color:#ccc}
@media(max-width:768px){nav{padding:18px 0 0}.nav-links{gap:14px}footer{padding:36px 24px}}

.detail-wrap{max-width:860px;margin:0 auto;padding:100px 0 80px}
.detail-back{display:inline-block;margin-bottom:28px;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s}
.detail-back:hover{color:var(--text)}
.detail-header{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid #eee}
.detail-label{font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;font-weight:300}
.detail-title{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300}
.photo-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:60px}
.photo-grid img{width:100%;display:block}

.detail-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:32px;border-top:1px solid #eee}
.detail-bottom a{font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s}
.detail-bottom a:hover{color:var(--text)}
.btn-rsv{padding:11px 28px;background:var(--text);color:#fff!important}
@media(max-width:600px){.detail-wrap{padding:100px 12px 80px}.photo-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav id="nav" class="dark">
  <a href="index.html" class="nav-logo">
    <img class="logo-w" src="/uploads/common/logo-white.png" alt="GREG &amp; MATT">
    <img class="logo-d" src="/uploads/common/logo-dark.png" alt="GREG &amp; MATT">
  </a>
  <ul class="nav-links"><li><a href="about.html">about</a></li><li><a href="wedding.html" class=active>wedding</a></li><li><a href="product.html">product</a></li><li><a href="faq.html">faq</a></li><li><a href="reserve.html">reserve</a></li></ul>
</nav>
<div class="detail-wrap">
  <a href="wedding.html" class="detail-back">← 목록으로</a>
  <div class="detail-header">
    <div class="detail-label">wedding gallery</div>
    <h1 class="detail-title" id="hall-name">불러오는 중...</h1>
  </div>
  <div class="photo-grid" id="photo-grid"></div>
  <div class="detail-bottom">
    <a href="wedding.html">← 목록으로</a>
    <a href="reserve.html" class="btn-rsv">예약 문의하기</a>
  </div>
</div>
<footer>
  <div class="footer-logo"><img src="/uploads/common/logo-dark.png" alt="GREG &amp; MATT"></div>
  <div class="footer-sns">
    <a href="https://pf.kakao.com/_DQwxgT/chat" target="_blank">kakao</a>
    <a href="http://instagram.com/gregandmatt" target="_blank">instagram</a>
    <a href="https://blog.naver.com/gregandmatt" target="_blank">naver blog</a>
  </div>
  <div class="footer-copy">copyright © gregandmatt.com all rights reserved</div>
</footer>
<script>

const nav=document.getElementById('nav');
if(nav&&!nav.classList.contains('dark')){
  window.addEventListener('scroll',()=>{nav.classList.toggle('scrolled',window.scrollY>60)});
}

const params = new URLSearchParams(location.search);
const id = params.get('id');
if(!id){ location.href='wedding.html'; }

fetch(`/data/weddings/${id}.json`)
  .then(r=>r.json())
  .then(data=>{
    document.title = data.name + ' — GREG & MATT';
    document.getElementById('hall-name').textContent = data.name;
    const grid = document.getElementById('photo-grid');
    const photos = data.photos;
    let html = photos.map(p=>`<img src="${p}" loading="lazy">`).join('');
    grid.innerHTML = html;
  })
  .catch(()=>{ location.href='wedding.html'; });
</script>
</body>
</html>
