① 웨딩 갤러리 클릭 → 어디로? 지금은 라이트박스(팝업)로 열리게 돼 있어. 근데 그렉앤맷은 이미 티스토리에 웨딩홀별 포스팅이 있잖아. 그러면 갤러리 썸네일 클릭 → 해당 티스토리 포스팅 URL로 이동 하게 연결하면 돼. 개별 포스팅 작업은 티스토리에서 하는 거 그대로 유지.

예: 아펠가모 썸네일 클릭 → gregandmatt.com/61 이동

② 예약폼 → 구글폼 연결 이미 구글폼 잘 쓰고 있으니까 새로 만들 필요 없어. reserve 페이지에서 구글폼을 iframe으로 임베드하거나, 버튼 클릭 시 폼으로 이동하게 연결하면 됨.

