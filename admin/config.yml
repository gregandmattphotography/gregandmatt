CMS 작동하고 있어. 이제 포스팅 방법:

① 아이디 — 영문으로 입력 (예: appel-jamsil)

② 웨딩홀 이름 — 한글로 (예: 잠실 아펠가모)

③ 썸네일 — "Choose an image" 클릭 → "Upload" 탭 → 사진 파일 선택

④ 사진 목록 — 각 "사진" 항목 클릭해서 펼치면 사진 업로드 버튼 나와. "Add 사진 +" 눌러서 사진 추가

⑤ Publish 클릭

